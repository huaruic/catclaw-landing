<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark">
    <title>CatClaw - Run AI Locally, Stay Private</title>
    <meta name="description" content="CatClaw is a cozy desktop app for running local AI agents. No Docker, no complex configs — just download and start chatting with full privacy. Open source and free.">
    <meta name="keywords" content="CatClaw, local AI, AI agents, private AI, desktop AI, open source AI, offline AI, AI chat">
    <link rel="canonical" href="https://catclaw.app/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catclaw.app/">
    <meta property="og:title" content="CatClaw - Run AI Locally, Stay Private">
    <meta property="og:description" content="A cozy desktop home for local AI agents. No Docker, no complex configs — just download and start chatting with full privacy.">
    <meta property="og:image" content="https://catclaw.app/og-image.png">
    <meta property="og:site_name" content="CatClaw">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CatClaw - Run AI Locally, Stay Private">
    <meta name="twitter:description" content="A cozy desktop home for local AI agents. No Docker, no complex configs — just download and start chatting with full privacy.">
    <meta name="twitter:image" content="https://catclaw.app/og-image.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CatClaw",
      "url": "https://catclaw.app",
      "description": "A cozy desktop app for running local AI agents with full privacy.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "macOS",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "isAccessibleForFree": true,
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CatClaw",
      "url": "https://catclaw.app",
      "logo": "https://catclaw.app/favicon-192.png",
      "sameAs": [
        "https://github.com/huaruic/catclaw"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CatClaw",
      "url": "https://catclaw.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://catclaw.app/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
